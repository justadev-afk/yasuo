name: 🐛 Bug report
description: Something isn't working the way it should.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please search existing issues
        first to avoid duplicates.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: When I call `…`, I get `…`, but I expected `…`.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: >-
        Minimal code that reproduces the problem. **Never paste your API key** —
        redact it as `RGAPI-***`.
      render: ts
      placeholder: |
        const yasuo = new Yasuo({ key: 'RGAPI-***' })
        const { data, error } = await yasuo.lol.summoner.byPuuid(puuid, Region.KR).execute()
        console.log(error)
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Error output
      description: The `error` from the `YasuoResponse` (status, body) or the thrown stack, if any.
      render: shell
  - type: input
    id: version
    attributes:
      label: yasuo version
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Node.js
        - Bun
        - Deno
        - Other (note in description)
    validations:
      required: true
  - type: input
    id: runtime-version
    attributes:
      label: Runtime version
      placeholder: "Node 20.11 / Bun 1.3.14"
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I removed my API key from all code and logs above.
          required: true
